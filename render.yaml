services:
  - type: web
    name: youtube-downloader-api
    env: node
    region: oregon
    plan: free
    buildCommand: |
      apt-get update
      apt-get install -y ffmpeg wget curl python3
      wget -O /usr/local/bin/yt-dlp https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp
      chmod a+rx /usr/local/bin/yt-dlp
      yt-dlp --version
      npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 18.17.0
    autoDeploy: true