services:
  - type: web
    name: youtube-downloader-api
    env: node
    region: oregon
    plan: free
    buildCommand: |
      apt-get update
      apt-get install -y ffmpeg python3 python3-pip
      pip3 install yt-dlp
      cp /usr/local/bin/yt-dlp /usr/bin/yt-dlp
      which yt-dlp
      yt-dlp --version
      npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 18.17.0
    autoDeploy: true